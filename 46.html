<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background-color:#1f2933;
    font-family: sans-serif;
}

.container {
    padding: 35px;
    border-radius: 20px;
    width: 320px;
    background: #111827;
    position: relative;
}
 
.input-box {
    position: relative;
} 

input {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 16px;
    background: #1f2933;
    color: white;
    margin-bottom: 20px;
} 

.fx {
    position: absolute;
    inset: 0;
    pointer-events: none;
}

.piece {
    position: absolute;
    color: white;
    font-size: 16px;
    animation: break 0.8s ease forwards;
}

@keyframes break {
    0% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
    }
    100% {
        opacity: 0;
        transform: translateY(70px) scale(0.3) rotate(30deg);
        filter: blur(4px);
    }
}

.plane {
    position: fixed;
    font-size: 26px;
    z-index: 999;
    animation: flyToCorner 1s ease-in forwards;
}

@keyframes flyToCorner {
    0% {
        transform: translate(0,0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translate(300px,-300px) scale(0.6);
        opacity: 0;
    }
}

.buttons {
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 13px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: #1f2933;
    color: white;
} 

.clear:hover { background: #7f1d1d; }
.send:hover { background: #1d4ed8; }

</style>
</head>

<body>

<div class="container">

    <div class="input-box">
        <input type="text" placeholder="✨Tekst jazin✨...">
        <div class="fx"></div>
    </div>

    <div class="buttons">
        <button class="clear">✨Clear✨</button>
        <button class="send">✨Send✨</button>
    </div>

</div>

<script>

const input = document.querySelector("input");
const fx = document.querySelector(".fx");
const clearBtn = document.querySelector(".clear");
const sendBtn = document.querySelector(".send");

clearBtn.addEventListener("click", () => {
    const text = input.value;
    input.value = "";
    fx.innerHTML = "";
        

      

    for (let i = 0; i < text.length; i++) {
        const span = document.createElement("span");
        span.classList.add("piece");
        span.textContent = text[i];

        span.style.left = (10 + i * 10) + "px";
        span.style.top = "12px";

        span.style.animationDelay = (i * 0.03) + "s";

        fx.appendChild(span);

        setTimeout(() => span.remove(), 900);
    }
});

sendBtn.addEventListener("click", () => {
    const plane = document.createElement("div");
    
plane.classList.add("plane");
    plane.textContent = "✈️";
    document.body.appendChild(plane);

    plane.style.left = "50%";
    plane.style.top = "50%";

    setTimeout(() => plane.remove(), 1000);

    input.value = "";
});

</script>

</body>
</html>
