<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Qalqon Pult</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            margin: 0;
            font-family: sans-serif;
        }

        /* Qalqonsimon Pult Konteyneri */
        .shield-remote {
            width: 240px;
            height: 380px;
            background: linear-gradient(145deg, #2c3e50, #1a252f);
            border: 5px solid #bdc3c7;
            /* Qalqon shakli: tepa burchaklar biroz egilgan, pastki qismi katta radiusli */
            border-radius: 20px 20px 120px 120px; 
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            position: relative;
        }

        /* Tugmalar ustuni */
        .column {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 35px;
        }

        /* 1,2,3 va 4,5,6 tugmalari */
        .btn-num {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid #34495e;
            background-color: #2c3e50;
            color: #ecf0f1;
            font-size: 20px;
            font-weight: bold;
            cursor: default;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
        }

        /* Markazdagi To'g'ri To'rtburchak OFF tugmasi */
        .btn-off {
            width: 70px;
            height: 180px;
            background-color: #c0392b;
            color: white;
            border: 3px solid #e74c3c;
            border-radius: 8px;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Matnni vertikal qilish */
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 10px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }

        .btn-off:hover {
            background-color: #e74c3c;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.6);
            transform: scale(1.02);
        }

        .btn-off:active {
            transform: scale(0.95);
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        /* Dekorativ chiziq */
        .shield-line {
            position: absolute;
            top: 15px;
            width: 60px;
            height: 4px;
            background-color: #bdc3c7;
            border-radius: 2px;
        }
    </style>
</head>
<body>

<div class="shield-remote">
    <div class="shield-line"></div>

    <div class="column">
        <button class="btn-num">1</button>
        <button class="btn-num">2</button>
        <button class="btn-num">3</button>
    </div>

    <button class="btn-off" onclick="closeWindow()">OFF</button>

    <div class="column">
        <button class="btn-num">4</button>
        <button class="btn-num">5</button>
        <button class="btn-num">6</button>
    </div>
</div>

<script>
    function closeWindow() {
        // Brauzer tabini yopishga urinish
        window.open('', '_self', ''); 
        window.close();

        // Agar oyna yopilmasa (brauzer xavfsizligi tufayli)
        setTimeout(() => {
            document.body.innerHTML = `
                <div style="background:#000; color:#ff0000; height:100vh; display:flex; 
                flex-direction:column; justify-content:center; align-items:center; text-align:center;">
                    <h1 style="font-size:3rem;">TIZIM O'CHDI</h1>
                    <p style="font-size:1.5rem;">Iltimos, tabni qo'lda yoping.</p>
                </div>
            `;
            window.location.href = "about:blank";
        }, 150);
    }
</script>

</body>
</html>
